<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>ZenFlow - 3D Pırpır Uçak Rehabilitasyonu</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Azeret+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* ZEN MORPHISM GİRİŞ MENÜSÜ */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.5);
            --zen-sage: #6d8c7c;
            --zen-dark: #4a4238;
        }

        body { margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #f4ebe1; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f4ebe1 0%, #e2d4c5 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(109, 140, 124, 0.15);
            width: 85%; max-width: 480px;
            color: var(--zen-dark);
        }

        h2 { font-weight: 700; margin-top: 0; margin-bottom: 10px; color: #4e6358; }
        p { font-size: 13px; opacity: 0.9; margin-bottom: 25px; line-height: 1.5; }

        .menu-group { margin: 18px 0; text-align: left; }
        label { font-size: 12px; font-weight: 500; color: #5c5346; }

        select {
            width: 100%; padding: 14px; font-size: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.7);
            color: var(--zen-dark); font-family: 'Poppins'; outline: none; margin-top: 6px;
            font-weight: bold; cursor: pointer;
        }

        button {
            width: 100%; padding: 18px; font-size: 18px; border: none;
            border-radius: 14px; background: var(--zen-sage); color: white;
            cursor: pointer; margin-top: 20px; font-weight: 700;
            box-shadow: 0 10px 20px rgba(109, 140, 124, 0.2); transition: all 0.3s;
        }
        button:hover { background: #5a7567; }

        /* HUD PANELİ */
        #ui-overlay {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 16px; border: 1px solid var(--glass-border);
            color: var(--zen-dark); font-family: 'Azeret Mono', monospace; font-size: 15px;
            z-index: 999; display: none; line-height: 1.6;
        }
        .highlight { color: #3e5247; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div>ZAMAN: <span id="ui-timer" class="highlight">03:00</span></div>
        <div>SKOR: <span id="ui-score" class="highlight">0</span></div>
    </div>

    <div id="start-screen">
        <div class="glass-panel">
            <h2>ZEN COCKPIT - 3D UÇUŞ</h2>
            <p>Tam Servikal Mobilizasyon Seansı<br>Başınızı sağa/sola yatırarak yönü, yukarı/aşağı eğerek yüksekliği kontrol edin.</p>
            
            <div class="menu-group">
                <label for="speed-select">Uçuş Temposu (Hız)</label>
                <select id="speed-select">
                    <option value="12">Sakin Akış (Isınma Seviyesi)</option>
                    <option value="16" selected>Standart Klinik Tempo</option>
                    <option value="22">Dinamik Akış (Gelişmiş Seviye)</option>
                </select>
            </div>

            <div class="menu-group">
                <label for="load-select">Halka Sıklığı</label>
                <select id="load-select">
                    <option value="2.4" selected>Geniş Aralıklı</option>
                    <option value="1.6">Sık Aralıklı (Yoğun Egzersiz)</option>
                </select>
            </div>

            <button id="start-btn">KOKPİTİ AÇ VE BAŞLA</button>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-sky color="#dbeafe"></a-sky>
        <a-light type="ambient" color="#fef08a" intensity="0.9"></a-light>
        <a-light type="directional" position="3 8 -3" intensity="0.6" color="#ffffff"></a-light>

        <a-entity id="flight-core" position="0 0 0">
            
            <a-entity id="player-plane" position="0 -0.2 -3" rotation="0 180 0">
                <a-cylinder color="#c29a76" radius="0.15" height="0.9" rotation="90 0 0"></a-cylinder>
                
                <a-box color="#6d8c7c" width="1.6" height="0.02" depth="0.22" position="0 0.22 -0.1"></a-box>
                <a-box color="#6d8c7c" width="1.6" height="0.02" depth="0.22" position="0 -0.15 -0.1"></a-box>
                <a-cylinder color="#4a4238" radius="0.01" height="0.37" position="0.7 0.03 -0.1"></a-cylinder>
                <a-cylinder color="#4a4238" radius="0.01" height="0.37" position="-0.7 0.03 -0.1"></a-cylinder>
                
                <a-box color="#5a7567" width="0.02" height="0.3" depth="0.2" position="0 0.18 0.35"></a-box>
                <a-box color="#6d8c7c" width="0.5" height="0.02" depth="0.12" position="0 0.1 0.35"></a-box>

                <a-cone color="#4a4238" radius-bottom="0.15" radius-top="0.05" height="0.15" position="0 0 -0.5" rotation="90 0 0"></a-cone>
                <a-entity id="propeller" position="0 0 -0.58">
                    <a-box color="#1a1a1a" width="0.7" height="0.04" depth="0.01"></a-box>
                </a-entity>
            </a-entity>

            <a-entity camera position="0 0.6 0.6" look-controls="enabled: false"></a-entity>
        </a-entity>

        <a-entity id="course-container"></a-entity>

        <a-entity id="scenery-group"></a-entity>
    </a-scene>

    <script>
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const uiOverlay = document.getElementById('ui-overlay');
        const uiTimer = document.getElementById('ui-timer');
        const uiScore = document.getElementById('ui-score');
        const courseContainer = document.getElementById('course-container');
        const sceneryGroup = document.getElementById('scenery-group');
        
        const flightCore = document.getElementById('flight-core');
        const playerPlane = document.getElementById('player-plane');
        const propeller = document.getElementById('propeller');

        let score = 0;
        let timeLeft = 180; // Tam 3 Dakika
        let clockInterval, spawnInterval, frameId, wakeLock = null;
        let audioCtx = null;

        // Klinik Ayarlar
        let forwardSpeed = 0.16; 
        let ringFrequency = 2400; 
        
        // Dinamik Pozisyon Matrisleri
        let targetX = 0; 
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        // Dekorasyon için pastel Zen ağaç elemanları oluştur
        for(let i=0; i<40; i++) {
            let side = i % 2 === 0 ? 1 : -1;
            let tree = document.createElement('a-cone');
            tree.setAttribute('color', '#a7f3d0');
            tree.setAttribute('radius-bottom', '1.5');
            tree.setAttribute('height', '4');
            tree.setAttribute('position', `${side * (Math.random() * 15 + 6)} -4.5 ${-i * 20}`);
            sceneryGroup.appendChild(tree);
        }

        startBtn.addEventListener('click', async () => {
            forwardSpeed = parseInt(document.getElementById('speed-select').value) / 100;
            ringFrequency = parseFloat(document.getElementById('load-select').value) * 1000;

            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(permission => {
                    if (permission === 'granted') startZenFlight();
                }).catch(() => startZenFlight());
            } else {
                startZenFlight();
            }
        });

        function startZenFlight() {
            startScreen.style.display = 'none';
            uiOverlay.style.display = 'block';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Gelişmiş Jiroskop Takipçisi (Hem Sağa/Sola Tilt hem Yukarı/Aşağı Pitch algılar)
            window.addEventListener('deviceorientation', processBioFeedbackSensors);

            // Masaüstü Testleri İçin Klavye Desteği (Yön Tuşları)
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') targetX = -3.5;
                if (e.key === 'ArrowRight') targetX = 3.5;
                if (e.key === 'ArrowUp') targetY = 2.2;
                if (e.key === 'ArrowDown') targetY = -1.8;
            });
            window.addEventListener('keyup', () => { targetX = currentX; targetY = currentY; });

            frameId = requestAnimationFrame(renderLoop);

            clockInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                uiTimer.textContent = `${m}:${s}`;
                if (timeLeft <= 0) terminateZenFlight();
            }, 1000);

            generateNextRing();
            spawnInterval = setInterval(generateNextRing, ringFrequency);
        }

        // TAM SERVİKAL KONTROL MOTORU (3 BOYUTLU HAREKET)
        function processBioFeedbackSensors(event) {
            // 1. Sağa/Sola Tilt (Gamma): Uçağın sağa sola kaymasını sağlar
            let rawTilt = event.gamma; 
            if (window.orientation === 90) rawTilt = event.beta;
            if (window.orientation === -90) rawTilt = -event.beta;

            // 2. Yukarı/Aşağı Eğme (Beta): Uçağın yükselip alçalmasını sağlar
            let rawPitch = event.beta; 

            // HAREKET ARALIĞI (RANGE) İYİLEŞTİRMESİ
            // Hastanın boynunu fazla zorlamaması için çarpanları artırdım (Hassasiyet yükseltildi)
            if (rawTilt !== null && rawPitch !== null) {
                // Ölü bölge kontrolü (Küçük istemsiz titremeleri absorbe eder)
                if (Math.abs(rawTilt) < 3) rawTilt = 0;
                if (Math.abs(rawPitch - 45) < 3) rawPitch = 45; // 45 derece telefonu dik tutma ortalamasıdır

                // Klinikte test edilmiş maksimum limit esnekliği
                let clampedTilt = Math.max(-25, Math.min(25, rawTilt));
                let clampedPitch = Math.max(20, Math.min(70, rawPitch)) - 45; // Merkeze göre hizalama

                // YENİ RANGE HESABI: Artık uçak ekranın en dış noktalarına rahatça ulaşabilir
                targetX = (clampedTilt / 25) * 3.8; 
                targetY = (-clampedPitch / 25) * 2.5; // Eksi yön yukarı kalkışı simüle eder

                // Pırpır uçağa yatış efekti ver
                playerPlane.setAttribute('rotation', `0 180 ${-clampedTilt * 1.4}`);
            }
        }

        // RENDER VE FİZİK DÖNGÜSÜ
        let propRotation = 0;
        function renderLoop() {
            // 1. Sürekli İleri Gitme Hareketi
            let corePos = flightCore.getAttribute('position');
            corePos.z -= forwardSpeed;

            // 2. Yumuşatılmış Pozisyon Yaklaşımı (Lerp Damping - Titreşim Önleyici)
            currentX += (targetX - currentX) * 0.15;
            currentY += (targetY - currentY) * 0.15;
            
            corePos.x = currentX;
            corePos.y = currentY;
            flightCore.setAttribute('position', corePos);

            // 3. Pervaneyi Döndür (Pırpır Uçak Hissiyatı)
            propRotation += 25;
            propeller.setAttribute('rotation', `0 0 ${propRotation}`);

            // Halkalarla olan teması ölç
            detectRingPass(corePos);

            if (timeLeft > 0) {
                frameId = requestAnimationFrame(renderLoop);
            }
        }

        // 3D UZAYDA RASTGELE HALKA ÜRETİCİSİ
        let ringCounter = 0;
        const activeRings = [];

        function generateNextRing() {
            let corePos = flightCore.getAttribute('position');
            let spawnZ = corePos.z - 45; // Uçağın 45 metre ilerisinde doğar

            // Genişletilmiş yeni range'e uygun olarak halkalar hem X hem Y ekseninde dağılır
            let spawnX = (Math.random() - 0.5) * 6;  // -3.0 ile +3.0 arası geniş yatay alan
            let spawnY = (Math.random() - 0.5) * 3.6; // -1.8 ile +1.8 arası geniş dikey alan

            let ring = document.createElement('a-torus');
            ring.setAttribute('id', `ring-${ringCounter++}`);
            ring.setAttribute('radius', '0.5'); // Geçişi kolaylaştırmak adına halka çapı hafif büyütüldü
            ring.setAttribute('radius-tubular', '0.03');
            ring.setAttribute('color', '#dc2626'); // Soft kırmızı/mercan zen rengi başlangıç
            ring.setAttribute('position', `${spawnX} ${spawnY} ${spawnZ}`);
            
            courseContainer.appendChild(ring);

            activeRings.push({
                element: ring,
                x: spawnX,
                y: spawnY,
                z: spawnZ,
                checked: false
            });
        }

        // 3 BOYUTLU TEMAS DENETİMİ
        function detectRingPass(planePos) {
            for (let i = activeRings.length - 1; i >= 0; i--) {
                let r = activeRings[i];

                if (!r.checked && planePos.z <= r.z) {
                    r.checked = true;

                    // Hem X hem Y eksenindeki sapma payını hesapla (Öklid mesafesi)
                    let diffX = planePos.x - r.x;
                    let diffY = planePos.y - r.y;
                    let absoluteDistance = Math.sqrt(diffX*diffX + diffY*diffY);

                    if (absoluteDistance <= 0.65) { // Başarılı geçiş limiti
                        score++;
                        uiScore.textContent = score;
                        r.element.setAttribute('color', '#16a34a'); // Zen Yeşili onay rengi
                        playZenSound(550, 'sine');
                    } else {
                        r.element.setAttribute('color', '#94a3b8'); // Soft Gri kaçırma rengi
                        playZenSound(160, 'triangle');
                    }

                    // Arkada kalan halkaları temizle
                    setTimeout(() => {
                        if (r.element.parentNode) r.element.parentNode.removeChild(r.element);
                        let idx = activeRings.indexOf(r);
                        if (idx > -1) activeRings.splice(idx, 1);
                    }, 1500);
                }
            }
        }

        function playZenSound(frequency, type) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            osc.type = type;
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function terminateZenFlight() {
            cancelAnimationFrame(frameId);
            clearInterval(clockInterval);
            clearInterval(spawnInterval);
            if (wakeLock) wakeLock.release();
            alert(`3 Dakikalık 3D Egzersiz Başarıyla Tamamlandı.\nToplam Geçiş Skorunuz: ${score}`);
            location.reload();
        }
    </script>
</body>
</html>

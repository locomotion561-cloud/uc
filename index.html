<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>ZenFlow - Otoban ve Trafik Akışlı Uçuş Seansı</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Azeret+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --zen-sage: #5f7d6e;
            --zen-dark: #3e3830;
        }

        body { margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #f1e6da; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f1e6da 0%, #decbba 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 12px 40px 0 rgba(95, 125, 110, 0.15);
            width: 85%; max-width: 480px;
            color: var(--zen-dark);
        }

        h2 { font-weight: 700; margin-top: 0; margin-bottom: 10px; color: #43594e; }
        p { font-size: 13px; opacity: 0.9; margin-bottom: 25px; line-height: 1.5; }

        .menu-group { margin: 18px 0; text-align: left; }
        label { font-size: 12px; font-weight: 500; color: #50483e; }

        select {
            width: 100%; padding: 14px; font-size: 15px; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.8);
            color: var(--zen-dark); font-family: 'Poppins'; outline: none; margin-top: 6px;
            font-weight: bold; cursor: pointer;
        }

        button {
            width: 100%; padding: 18px; font-size: 18px; border: none;
            border-radius: 14px; background: var(--zen-sage); color: white;
            cursor: pointer; margin-top: 20px; font-weight: 700;
            box-shadow: 0 10px 20px rgba(95, 125, 110, 0.2); transition: all 0.3s;
        }
        button:hover { background: #4d665a; }

        #ui-overlay {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 16px; border: 1px solid var(--glass-border);
            color: var(--zen-dark); font-family: 'Azeret Mono', monospace; font-size: 15px;
            z-index: 999; display: none; line-height: 1.6;
        }
        .highlight { color: #35473e; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div>SEANS SÜRESİ: <span id="ui-timer" class="highlight">03:00</span></div>
        <div>HALKA SKORU: <span id="ui-score" class="highlight">0</span></div>
    </div>

    <div id="start-screen">
        <div class="glass-panel">
            <h2>ZEN VADİSİ UÇUŞU v4</h2>
            <p>Dinamik Motor Sesli, Süzülen Kontrol Motoru ve Canlı Otoban Trafiği<br>Uçağın irtifa değişimleri ve dönüşleri, akustik ses motoruyla kulaklarınıza yansıtılırken, aşağıdaki otobanda akan trafiği ve olayları izleyin.</p>
            
            <div class="menu-group">
                <label for="speed-select">Uçuş Hızı</label>
                <select id="speed-select">
                    <option value="12">Sakin Akış (Isınma)</option>
                    <option value="17" selected>Standart Klinik Akış</option>
                    <option value="24">Dinamik Akış (Zorlu)</option>
                </select>
            </div>

            <div class="menu-group">
                <label for="load-select">Halka Sıklığı</label>
                <select id="load-select">
                    <option value="2.2" selected>Geniş Aralıklı</option>
                    <option value="1.5">Sık Aralıklı</option>
                </select>
            </div>

            <button id="start-btn">MOTORU ÇALIŞTIR VE BAŞLAT</button>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-sky color="#cfe2fe"></a-sky>
        <a-light type="ambient" color="#fffbeb" intensity="1.0"></a-light>
        <a-light type="directional" position="5 12 -4" intensity="0.7" color="#ffffff"></a-light>

        <a-entity id="flight-core" position="0 0 0">
            
            <a-entity id="player-plane" position="0 -0.15 -2.5" rotation="0 0 0">
                <a-cone color="#b38b6d" radius-bottom="0.16" radius-top="0.04" height="0.8" rotation="90 0 0"></a-cone>
                <a-box color="#e2e8f0" width="0.12" height="0.08" depth="0.06" position="0 0.12 -0.1" opacity="0.7"></a-box>
                
                <a-box color="#5f7d6e" width="1.8" height="0.03" depth="0.24" position="0 0.24 -0.05"></a-box>
                <a-box color="#5f7d6e" width="1.8" height="0.03" depth="0.24" position="0 -0.12 -0.05"></a-box>
                
                <a-cylinder color="#94a3b8" radius="0.008" height="0.36" position="0.8 0.06 -0.05"></a-cylinder>
                <a-cylinder color="#94a3b8" radius="0.008" height="0.36" position="-0.8 0.06 -0.05"></a-cylinder>
                <a-cylinder color="#94a3b8" radius="0.008" height="0.36" position="0.4 0.06 -0.05"></a-cylinder>
                <a-cylinder color="#94a3b8" radius="0.008" height="0.36" position="-0.4 0.06 -0.05"></a-cylinder>

                <a-box color="#4d665a" width="0.015" height="0.25" depth="0.16" position="0 0.16 0.38" rotation="10 0 0"></a-box>
                <a-box color="#5f7d6e" width="0.55" height="0.015" depth="0.12" position="0 0.04 0.38"></a-box>

                <a-cylinder color="#3e3830" radius="0.06" height="0.03" position="0.2 -0.22 -0.1" rotation="0 0 90"></a-cylinder>
                <a-cylinder color="#3e3830" radius="0.06" height="0.03" position="-0.2 -0.22 -0.1" rotation="0 0 90"></a-cylinder>
                <a-box color="#94a3b8" width="0.4" height="0.02" depth="0.02" position="0 -0.18 -0.1"></a-box>

                <a-sphere color="#3e3830" radius="0.12" position="0 0 -0.4" scale="1 1 1.3"></a-sphere>
                <a-entity id="propeller" position="0 0 -0.52">
                    <a-box color="#1e293b" width="0.75" height="0.05" depth="0.015"></a-box>
                    <a-circle color="#b38b6d" radius="0.04" position="0 0 -0.01"></a-circle>
                </a-entity>
            </a-entity>

            <a-entity camera position="0 0.45 0.5" look-controls="enabled: false"></a-entity>
        </a-entity>

        <a-entity id="course-container"></a-entity>

        <a-entity id="terrain-environment">
            <a-entity id="left-hills"></a-entity>
            <a-entity id="right-hills"></a-entity>
            
            <a-plane id="highway" position="0 -5.5 0" rotation="-90 0 0" width="14" height="1500" color="#334155" material="roughness: 0.8; metalness: 0.1">
                <a-plane position="-3.5 0 0.01" width="0.2" height="1500" color="#FFFFFF" opacity="0.8"></a-plane>
                <a-plane position="0 0 0.01" width="0.2" height="1500" color="#FFFFFF" opacity="0.8"></a-plane>
                <a-plane position="3.5 0 0.01" width="0.2" height="1500" color="#FFFFFF" opacity="0.8"></a-plane>
                
                <a-entity id="traffic-container"></a-entity>
            </a-plane>
            <a-plane position="0 -5.52 0" rotation="-90 0 0" width="16" height="1500" color="#94a3b8"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const uiOverlay = document.getElementById('ui-overlay');
        const uiTimer = document.getElementById('ui-timer');
        const uiScore = document.getElementById('ui-score');
        const courseContainer = document.getElementById('course-container');
        const leftHills = document.getElementById('left-hills');
        const rightHills = document.getElementById('right-hills');
        const highway = document.getElementById('highway');
        const trafficContainer = document.getElementById('traffic-container');
        
        const flightCore = document.getElementById('flight-core');
        const playerPlane = document.getElementById('player-plane');
        const propeller = document.getElementById('propeller');

        let score = 0;
        let timeLeft = 180; 
        let clockInterval, spawnInterval, frameId, wakeLock = null;
        
        // SES SİSTEMİ DEĞİŞKENLERİ
        let audioCtx = null;
        let ambientBpmInterval = null;
        
        // DİNAMİK MOTOR SESİ MODÜLLERİ
        let engineOsc = null;
        let engineFilter = null;
        let engineGain = null;

        let forwardSpeed = 0.17; 
        let ringFrequency = 2200; 
        
        let targetX = 0; 
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        let targetPlaneTilt = 0;
        let currentPlaneTilt = 0;

        // Vadi Tasarımı
        for(let i=0; i<60; i++) {
            let currentZ = -i * 25;
            
            let lHill = document.createElement('a-cone');
            lHill.setAttribute('color', '#a7f3d0');
            lHill.setAttribute('radius-bottom', '8');
            lHill.setAttribute('height', '9');
            lHill.setAttribute('position', `${-13 - (Math.random()*4)} -5.0 ${currentZ}`);
            leftHills.appendChild(lHill);

            let rHill = document.createElement('a-cone');
            rHill.setAttribute('color', '#a7f3d0');
            rHill.setAttribute('radius-bottom', '8');
            rHill.setAttribute('height', '9');
            rHill.setAttribute('position', `${14 + (Math.random()*4)} -5.0 ${currentZ}`);
            rightHills.appendChild(rHill);

            if (i % 2 === 0) {
                let rock = document.createElement('a-dodecahedron');
                rock.setAttribute('color', '#94a3b8');
                rock.setAttribute('radius', '0.9');
                let sideX = i % 4 === 0 ? -6.0 : 6.0;
                rock.setAttribute('position', `${sideX} -5.1 ${currentZ + 5}`);
                courseContainer.appendChild(rock);
            }
        }

        startBtn.addEventListener('click', async () => {
            forwardSpeed = parseInt(document.getElementById('speed-select').value) / 100;
            ringFrequency = parseFloat(document.getElementById('load-select').value) * 1000;

            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(permission => {
                    if (permission === 'granted') startZenFlight();
                }).catch(() => startZenFlight());
            } else {
                startZenFlight();
            }
        });

        function startZenFlight() {
            startScreen.style.display = 'none';
            uiOverlay.style.display = 'block';
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // SESLERİ BAŞLAT
            startAmbientZenMusic();
            initEngineSoundSimulator();
            
            // TRAFİK ÜRETİMİNİ BAŞLAT
            initTrafficSimulation();

            window.addEventListener('deviceorientation', processBioFeedbackSensors);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') targetX = -6.5; 
                if (e.key === 'ArrowRight') targetX = 6.5;
                if (e.key === 'ArrowUp') targetY = 5.0; 
                if (e.key === 'ArrowDown') targetY = -3.5; 
            });
            window.addEventListener('keyup', () => { targetX = currentX; targetY = currentY; });

            frameId = requestAnimationFrame(renderLoop);

            clockInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                uiTimer.textContent = `${m}:${s}`;
                if (timeLeft <= 0) terminateZenFlight();
            }, 1000);

            generateNextRing();
            spawnInterval = setInterval(generateNextRing, ringFrequency);
        }

        function processBioFeedbackSensors(event) {
            let rawTilt = event.gamma; 
            if (window.orientation === 90) rawTilt = event.beta;
            if (window.orientation === -90) rawTilt = -event.beta;
            let rawPitch = event.beta; 

            if (rawTilt === null || rawPitch === null) return;

            let verticalNeutral = 75; 
            
            let deltaTilt = rawTilt; 
            let deltaPitch = rawPitch - verticalNeutral; 

            if (Math.abs(deltaTilt) < 1.5) deltaTilt = 0;
            if (Math.abs(deltaPitch) < 1.5) deltaPitch = 0;

            let clampedDeltaTilt = Math.max(-20, Math.min(20, deltaTilt));
            let clampedDeltaPitch = Math.max(-20, Math.min(20, deltaPitch));

            targetX = (clampedDeltaTilt / 20) * 6.5;   
            targetY = (clampedDeltaPitch / 20) * 5.0; 
            
            targetPlaneTilt = -clampedDeltaTilt * 2.2;
        }

        let propRotation = 0;
        function renderLoop() {
            let corePos = flightCore.getAttribute('position');
            corePos.z -= forwardSpeed;

            // Otoban takibi (Sonsuz akış görünümü)
            let rPos = highway.getAttribute('position');
            rPos.z = corePos.z;
            highway.setAttribute('position', rPos);
            
            // TRAFİK GÜNCELLEME MOTORU (Araçların hareketi ve olaylar)
            updateTrafficSimulation(corePos);

            // Akışkan süzülme takibi (0.05)
            currentX += (targetX - currentX) * 0.05;
            currentY += (targetY - currentY) * 0.05;
            currentPlaneTilt += (targetPlaneTilt - currentPlaneTilt) * 0.05;
            
            corePos.x = currentX;
            corePos.y = currentY;
            flightCore.setAttribute('position', corePos);

            playerPlane.setAttribute('rotation', `0 0 ${currentPlaneTilt}`);

            // YENİ: ANLIK HAREKETE GÖRE DİNAMİK MOTOR SESİ AYARLAMA MOTORU
            updateEngineAudioDynamics(currentY, currentX);

            propRotation += 35;
            propeller.setAttribute('rotation', `0 0 ${propRotation}`);

            detectRingPass(corePos);

            if (timeLeft > 0) {
                frameId = requestAnimationFrame(renderLoop);
            }
        }

        // GERÇEK ZAMANLI MOTOR SENTEZLEYİCİSİ KURULUMU
        function initEngineSoundSimulator() {
            if (!audioCtx) return;

            // Düşük frekanslı testere dişi dalga formu (Pırpır motor silindir efekti için idealdir)
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(65, audioCtx.currentTime); // Temel rölanti frekansı

            // Kulak tırmalamaması için alçak geçiren filtre (Low-pass)
            engineFilter = audioCtx.createBiquadFilter();
            engineFilter.type = 'lowpass';
            engineFilter.frequency.setValueAtTime(160, audioCtx.currentTime);

            // Ses seviye kontrolü
            engineGain = audioCtx.createGain();
            engineGain.gain.setValueAtTime(0.08, audioCtx.currentTime); // Dengeli zemin sesi

            // Bağlantılar
            engineOsc.connect(engineFilter);
            engineFilter.connect(engineGain);
            engineGain.connect(audioCtx.destination);

            engineOsc.start();
        }

        // HAREKETE DUYARLI MOTOR DİNAMİKLERİNİ GÜNCELLEME
        function updateEngineAudioDynamics(yPos, xPos) {
            if (!engineOsc || !engineFilter || !engineGain) return;

            // 1. İRTİFA ETKİSİ (yPos yukarı çıktıkça artar, aşağı indikçe azalır)
            // Normal aralık yaklaşık -3.5 ile +5.0 arasıdır. Bunu normalize edip haritalandırıyoruz.
            let pitchFactor = (yPos + 3.5) / 8.5; // 0 ile 1 arasına sıkıştır
            pitchFactor = Math.max(0, Math.min(1, pitchFactor));

            // Tırmanırken ses tizleşir (65Hz -> 95Hz), alçalırken pesleşir ve yavaşlar (65Hz -> 48Hz)
            let targetFrequency = 48 + (pitchFactor * 47);
            
            // Dönüşlerde de motorun devrinin hafif dalgalanması efekti (Abs xPos etkisi)
            let turnFactor = Math.abs(xPos) / 6.5;
            targetFrequency += (turnFactor * 8); // Dönüşlerde ekstra zorlanma sesi

            // Yumuşak geçişli ses değişimi (Giriş çıkışları kulak tırmalamaz)
            engineOsc.frequency.setTargetAtTime(targetFrequency, audioCtx.currentTime, 0.1);

            // Tırmanırken motor bağırır (Hacim artar), süzülürken gaz keser (Hacim azalır)
            let targetVolume = 0.03 + (pitchFactor * 0.08) + (turnFactor * 0.02);
            engineGain.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.15);

            // Filtre frekansını da hacme paralel açıp kapatarak derinlik/boğukluk hissini veriyoruz
            let targetFilterFreq = 110 + (pitchFactor * 100);
            engineFilter.frequency.setTargetAtTime(targetFilterFreq, audioCtx.currentTime, 0.1);
        }

        // TRAFİK SİMÜLASYONU VE OLAYLAR MOTORU
        const vehicles = [];
        const laneX = [-5.25, -1.75, 1.75, 5.25];
        const vehicleColors = ['#F44336', '#2196F3', '#4CAF50', '#FFEB3B', '#9C27B0', '#FF9800'];
        let trafficSpawnInterval;

        function initTrafficSimulation() {
            // Başlangıç araçlarını oluştur
            for (let i = 0; i < 30; i++) {
                spawnVehicle(-i * 40 - 50);
            }
            // Düzenli araç üretimi (Otoban akışı için)
            trafficSpawnInterval = setInterval(() => {
                if (timeLeft > 0) spawnVehicle(flightCore.getAttribute('position').z - 1200);
            }, 800);
        }

        function spawnVehicle(zPos) {
            let vehicle = document.createElement('a-box');
            let type = Math.random();
            let width, height, depth;

            // Araç Tipi Belirleme (Otomobil, Kamyon)
            if (type < 0.8) { // Otomobil
                width = 1.8; height = 1.2; depth = 3.5;
                vehicle.setAttribute('color', vehicleColors[Math.floor(Math.random() * vehicleColors.colorsCount)]);
            } else { // Kamyon/TIR
                width = 2.4; height = 3.0; depth = 10.0;
                vehicle.setAttribute('color', '#78909C'); // Kamyon rengi
            }

            vehicle.setAttribute('width', width);
            vehicle.setAttribute('height', height);
            vehicle.setAttribute('depth', depth);
            
            let lane = Math.floor(Math.random() * 4);
            // Yüksekliği otoban düzlemine (y=-5.5) göre ayarla (Araç yüksekliğinin yarısı kadar yukarı)
            let yPos = (height / 2) + 0.05; // Otobanın hemen üzerinde
            vehicle.setAttribute('position', `${laneX[lane]} ${yPos} ${zPos}`);
            vehicle.setAttribute('material', 'roughness', '0.7');

            // Hız ve Olay Belirleme
            let event = Math.random();
            let speed;
            let status = 'normal';

            if (event < 0.7) { // Normal Akan Trafik
                speed = 1.5 + (Math.random() * 0.8);
            } else if (event < 0.85) { // Sıkışık Trafik (Yavaş Araçlar)
                speed = 0.3 + (Math.random() * 0.3);
                status = 'jammed';
                vehicle.setAttribute('color', '#A1887F'); // Sıkışık trafik araç rengi
            } else { // Kaza Olayı (Durmuş Araçlar ve Kaza Belirtileri)
                speed = 0;
                status = 'accident';
                vehicle.setAttribute('color', '#E57373'); // Kaza yapmış araç rengi
                vehicle.setAttribute('rotation', '0 25 0'); // Kaza yapmış gibi hafif dönük
                
                // Kaza Belirtisi: Küçük "duman" veya "yangın" efekti (Basit)
                if (Math.random() < 0.5) {
                    let smoke = document.createElement('a-cylinder');
                    smoke.setAttribute('radius', '0.3');
                    smoke.setAttribute('height', '2');
                    smoke.setAttribute('color', '#616161'); // Duman rengi
                    smoke.setAttribute('opacity', '0.6');
                    smoke.setAttribute('position', '0 1.5 0'); // Aracın üzerinden yükselen duman
                    vehicle.appendChild(smoke);
                }
            }

            trafficContainer.appendChild(vehicle);

            vehicles.push({
                element: vehicle,
                speed: speed,
                status: status,
                zPos: zPos,
                type: type < 0.8 ? 'car' : 'truck'
            });
        }

        function updateTrafficSimulation(planePos) {
            for (let i = vehicles.length - 1; i >= 0; i--) {
                let v = vehicles[i];

                // Araçları hareket ettir (Kazalar durur)
                v.zPos -= v.speed;
                let currentPos = v.element.getAttribute('position');
                currentPos.z = v.zPos;
                v.element.setAttribute('position', currentPos);

                // Arkada kalan araçları temizle
                if (v.zPos > planePos.z + 50) {
                    if (v.element.parentNode) v.element.parentNode.removeChild(v.element);
                    vehicles.splice(i, 1);
                }
            }
        }

        let ringCounter = 0;
        const activeRings = [];

        function generateNextRing() {
            let corePos = flightCore.getAttribute('position');
            let spawnZ = corePos.z - 45; 

            let spawnX = (Math.random() - 0.5) * 10.0; 
            let spawnY = (Math.random() - 0.5) * 6.5;  

            let ring = document.createElement('a-torus');
            ring.setAttribute('id', `ring-${ringCounter++}`);
            
            ring.setAttribute('radius', '0.95'); 
            ring.setAttribute('radius-tubular', '0.06');
            ring.setAttribute('color', '#f43f5e'); 
            ring.setAttribute('position', `${spawnX} ${spawnY} ${spawnZ}`);
            
            courseContainer.appendChild(ring);

            activeRings.push({
                element: ring,
                x: spawnX,
                y: spawnY,
                z: spawnZ,
                checked: false
            });
        }

        function detectRingPass(planePos) {
            for (let i = activeRings.length - 1; i >= 0; i--) {
                let r = activeRings[i];

                if (!r.checked && planePos.z <= r.z) {
                    r.checked = true;

                    let diffX = planePos.x - r.x;
                    let diffY = planePos.y - r.y;
                    let absoluteDistance = Math.sqrt(diffX*diffX + diffY*diffY);

                    if (absoluteDistance <= 1.1) { 
                        score++;
                        uiScore.textContent = score;
                        r.element.setAttribute('color', '#10b981'); 
                        playZenSound(580, 'sine', 0.15); 
                    } else {
                        r.element.setAttribute('color', '#64748b'); 
                        playZenSound(150, 'triangle', 0.12); 
                    }

                    setTimeout(() => {
                        if (r.element.parentNode) r.element.parentNode.removeChild(r.element);
                        let idx = activeRings.indexOf(r);
                        if (idx > -1) activeRings.splice(idx, 1);
                    }, 1200);
                }
            }
        }

        function startAmbientZenMusic() {
            let step = 0;
            const notes = [220, 261.63, 293.66, 329.63, 392.00, 440]; 
            
            ambientBpmInterval = setInterval(() => {
                if (!audioCtx) return;
                
                if (step % 2 === 0) {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    let currentNote = notes[Math.floor(Math.random() * notes.length)];
                    osc.frequency.setValueAtTime(currentNote / 2, audioCtx.currentTime); 
                    osc.type = 'triangle';
                    
                    gain.gain.setValueAtTime(0.03, audioCtx.currentTime); 
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.8);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 1.8);
                }
                
                if (step % 4 === 0) {
                    let subOsc = audioCtx.createOscillator();
                    let subGain = audioCtx.createGain();
                    subOsc.connect(subGain);
                    subGain.connect(audioCtx.destination);
                    subOsc.frequency.setValueAtTime(73.42, audioCtx.currentTime); 
                    subOsc.type = 'sine';
                    subGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    subGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
                    subOsc.start();
                    subOsc.stop(audioCtx.currentTime + 0.4);
                }

                step++;
            }, 600); 
        }

        function playZenSound(frequency, type, volume) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function terminateZenFlight() {
            cancelAnimationFrame(frameId);
            clearInterval(clockInterval);
            clearInterval(spawnInterval);
            clearInterval(ambientBpmInterval);
            clearInterval(trafficSpawnInterval); // Trafik üretimini durdur
            
            if(engineOsc) { try { engineOsc.stop(); } catch(e){} }
            if (wakeLock) wakeLock.release();
            
            alert(`Seans Tamamlandı.\nHalka Geçiş Skorunuz: ${score}`);
            location.reload();
        }
    </script>
</body>
